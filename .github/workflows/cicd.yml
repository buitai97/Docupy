name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    secrets:
      EC2_HOST:
        required: true
      EC2_USER:
        required: true
      EC2_SSH_KEY:
        required: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./backend/package-lock.json
      - run: npm ci
        working-directory: ./backend
      - run: npm run build
        working-directory: ./backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json
      - run: npm ci
        working-directory: ./frontend
      - run: npm run lint
        working-directory: ./frontend
      - run: npm run build
        working-directory: ./frontend

  deploy:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets['EC2_HOST'] }}
          username: ${{ secrets['EC2_USER'] }}
          key: ${{ secrets['EC2_SSH_KEY'] }}
          script: |
            set -e
            cd ~/Docupy

            git pull origin main

            cd backend
            npm ci
            npm run build
            npm prune --omit=dev
            mkdir -p uploads
            cd ..

            cd frontend
            npm ci
            npm run build
            npm prune --omit=dev
            cd ..

            pm2 restart backend --update-env
            pm2 restart frontend --update-env
            pm2 save
